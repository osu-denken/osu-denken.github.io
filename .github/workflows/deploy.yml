name: Static Export to docs/

on:
  push:
    branches:
      - main

  # 管理画面から fake terminal を編集したとき、web-api がこれを叩いて再ビルドさせる
  workflow_dispatch:

jobs:
  build-and-export:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: false
      
      - name: Check commit message
        id: check_msg
        run: |
          echo "commit_msg<<EOF" >> $GITHUB_OUTPUT
          echo "$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
      - name: Skip if commit message contains [skip-ci]
        if: contains(steps.check_msg.outputs.commit_msg, '[skip-ci]')
        run: exit 0

      - name: Change submodule URL protocol to https from git (Actions only)
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      # --remote で main の先頭を取り込む。管理画面からの welcome.md の編集がここで反映される
      - name: Init terminal submodule
        run: git submodule update --init --remote public/terminal

      # フロントは web-api/src/util/permission.ts を @shared として import している。
      - name: Init web-api submodule
        run: git submodule update --init web-api

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      # export は distDir=docs でビルドするので、増分キャッシュは docs/cache に出る。
      # docs/cache は .gitignore で commit 対象から除外している (肥大化防止)
      - name: Cache Next.js build
        uses: actions/cache@v3
        with:
          path: docs/cache
          key: next-cache-${{ hashFiles('package-lock.json') }}
          restore-keys: next-cache-

      # export (IS_EXPORT=1 next build) が本番用の docs/ を生成する。
      # 以前は npm run build も実行していたが、その .next は deploy に使われず二重ビルドだった
      - name: Export static site
        run: npm run export

      - name: Remove .git directory from docs
        run: rm -rf docs/terminal/.git

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push docs
        run: |
          git add docs
          git commit -m "[skip-ci] Update docs from GitHub Actions" || echo "No changes to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
